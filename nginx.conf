server {
  listen 80;
  server_name admin.diettime.com _;
  root /usr/share/nginx/html;
  index index.html;
  location = /health { access_log off; add_header Content-Type text/plain; try_files $uri =404; }
  location / { try_files $uri $uri/ /index.html; }
  location ~* \.(?:js|css|svg|png|jpg|jpeg|webp|woff2)$ { expires 7d; add_header Cache-Control "public, immutable"; try_files $uri =404; }
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.diettime.com https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
}
